name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the triggering commit
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          git init .
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git -c http.https://github.com/.extraheader="AUTHORIZATION: basic $(printf 'x-access-token:%s' "$GITHUB_TOKEN" | base64 -w 0)" fetch --depth=1 origin "$GITHUB_REF"
          git checkout --detach FETCH_HEAD
          test "$(git rev-parse HEAD)" = "$GITHUB_SHA"
      - name: Verify Node.js 24
        run: test "$(node -p 'process.versions.node.split(".")[0]')" = "24"
      - run: npm ci
      - run: npm test
      - run: npm run typecheck
      - run: npm audit --audit-level=high --omit=dev

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the triggering commit
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          git init .
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git -c http.https://github.com/.extraheader="AUTHORIZATION: basic $(printf 'x-access-token:%s' "$GITHUB_TOKEN" | base64 -w 0)" fetch --depth=1 origin "$GITHUB_REF"
          git checkout --detach FETCH_HEAD
          test "$(git rev-parse HEAD)" = "$GITHUB_SHA"
      - name: Verify Node.js 24
        run: test "$(node -p 'process.versions.node.split(".")[0]')" = "24"
      - run: npm ci
      - run: npm run build
      - name: Verify dist is up to date
        run: git diff --exit-code -- dist/
