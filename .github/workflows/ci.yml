name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.x
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6.x
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run typecheck
      - run: npm audit --audit-level=high --omit=dev

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.x
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6.x
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Verify dist is up to date
        run: git diff --exit-code -- dist/
