name: "MergeRisk"
description: "Analyze pull-request merge risk with deterministic scoring and optional AI insights."
author: "One Code LLC"
branding:
  icon: "shield"
  color: "blue"
inputs:
  github-token:
    description: "GitHub token used to read pull requests and create or update report comments."
    required: true
    default: "${{ github.token }}"
  provider:
    description: "Optional AI provider: none, openai, openai-compatible, or anthropic."
    required: false
    default: "none"
  base-url:
    description: "Base URL for openai-compatible provider (e.g. https://api.groq.com/openai/v1). Required when provider is openai-compatible."
    required: false
    default: ""
  model:
    description: "Model name for AI synthesis."
    required: false
    default: ""
  api-key:
    description: "API key for the selected AI provider."
    required: false
    default: ""
  fail-on-risk:
    description: "Fail the workflow at this risk level: none, medium, high, or critical."
    required: false
    default: "none"
  max-patch-lines:
    description: "Maximum patch lines sent to AI synthesis."
    required: false
    default: "1200"
  comment-mode:
    description: "Comment behavior: update or new."
    required: false
    default: "update"
  risk-profile-path:
    description: "Optional path to a custom YAML risk profile."
    required: false
    default: ""
  test-review-mode:
    description: "How test impact is decided: auto, policy, or agent. Auto uses agent when a provider is configured."
    required: false
    default: "auto"
  test-policy-path:
    description: "Optional path to a YAML policy for deterministic test-review decisions."
    required: false
    default: ""
  ai-timeout-ms:
    description: "Request timeout in milliseconds for AI provider calls."
    required: false
    default: "30000"
outputs:
  risk-level:
    description: "Computed deterministic risk level: low, medium, high, or critical."
  risk-score:
    description: "Computed deterministic risk score."
runs:
  using: "node24"
  main: "dist/index.js"
